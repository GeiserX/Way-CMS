<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 200" width="900" height="200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00897B"/>
      <stop offset="100%" style="stop-color:#1A1A2E"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="900" height="200" rx="12" fill="url(#bg)"/>

  <!-- Grid lines -->
  <g stroke="white" stroke-opacity="0.04" stroke-width="1">
    <line x1="0" y1="40" x2="900" y2="40"/>
    <line x1="0" y1="80" x2="900" y2="80"/>
    <line x1="0" y1="120" x2="900" y2="120"/>
    <line x1="0" y1="160" x2="900" y2="160"/>
    <line x1="150" y1="0" x2="150" y2="200"/>
    <line x1="300" y1="0" x2="300" y2="200"/>
    <line x1="450" y1="0" x2="450" y2="200"/>
    <line x1="600" y1="0" x2="600" y2="200"/>
    <line x1="750" y1="0" x2="750" y2="200"/>
  </g>

  <!-- Browser window icon with edit cursor (left side) -->
  <g transform="translate(50, 40)">
    <!-- Browser window frame -->
    <rect x="0" y="0" width="105" height="80" rx="6" fill="none" stroke="white" stroke-width="2.5" opacity="0.9"/>
    <!-- Title bar -->
    <line x1="0" y1="18" x2="105" y2="18" stroke="white" stroke-width="1.5" opacity="0.5"/>
    <!-- Traffic light dots -->
    <circle cx="12" cy="9" r="3" fill="#FF5F56" opacity="0.7"/>
    <circle cx="24" cy="9" r="3" fill="#FFBD2E" opacity="0.7"/>
    <circle cx="36" cy="9" r="3" fill="#27C93F" opacity="0.7"/>
    <!-- URL bar -->
    <rect x="50" y="5" width="46" height="8" rx="4" fill="white" opacity="0.15"/>
    <!-- Content lines -->
    <rect x="10" y="26" width="45" height="3" rx="1.5" fill="white" opacity="0.3"/>
    <rect x="10" y="35" width="60" height="3" rx="1.5" fill="white" opacity="0.2"/>
    <rect x="10" y="44" width="38" height="3" rx="1.5" fill="white" opacity="0.25"/>
    <rect x="10" y="53" width="55" height="3" rx="1.5" fill="white" opacity="0.15"/>
    <rect x="10" y="62" width="42" height="3" rx="1.5" fill="white" opacity="0.2"/>
    <!-- Edit cursor / pencil -->
    <g transform="translate(72, 38)">
      <line x1="0" y1="30" x2="18" y2="0" stroke="white" stroke-width="2.5" stroke-linecap="round" opacity="0.85"/>
      <line x1="18" y1="0" x2="24" y2="4" stroke="white" stroke-width="2.5" stroke-linecap="round" opacity="0.85"/>
      <line x1="24" y1="4" x2="6" y2="34" stroke="white" stroke-width="2.5" stroke-linecap="round" opacity="0.85"/>
      <polygon points="0,30 -2,38 6,34" fill="white" opacity="0.7"/>
    </g>
    <!-- Text cursor blink line -->
    <line x1="58" y1="44" x2="58" y2="52" stroke="#80CBC4" stroke-width="2" opacity="0.8"/>
  </g>

  <!-- Wayback clock icon (small, decorative) -->
  <g transform="translate(110, 130)" opacity="0.35">
    <circle cx="15" cy="15" r="14" fill="none" stroke="white" stroke-width="1.5"/>
    <line x1="15" y1="15" x2="15" y2="6" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="15" y1="15" x2="22" y2="18" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
    <!-- Rewind arrow -->
    <path d="M 6,4 L 2,9 L 8,9" fill="none" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Title text -->
  <text x="200" y="105" font-family="'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif" font-size="50" font-weight="bold" fill="white">Way-CMS</text>

  <!-- Subtitle text -->
  <text x="202" y="135" font-family="'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif" font-size="17" fill="white" opacity="0.75">Simple web CMS for editing Wayback Archive files</text>

  <!-- Decorative elements (right side) -->
  <g transform="translate(700, 25)" opacity="0.12">
    <!-- Code/HTML brackets -->
    <text x="0" y="30" font-family="monospace" font-size="28" fill="white">&lt;/&gt;</text>
    <rect x="60" y="10" width="50" height="3" rx="1.5" fill="white"/>
    <rect x="60" y="22" width="70" height="3" rx="1.5" fill="white"/>
    <rect x="60" y="34" width="40" height="3" rx="1.5" fill="white"/>
  </g>
  <g transform="translate(720, 100)" opacity="0.1">
    <!-- File tree -->
    <rect x="0" y="0" width="140" height="75" rx="6" fill="none" stroke="white" stroke-width="1.5"/>
    <rect x="12" y="10" width="8" height="8" rx="1" fill="white" opacity="0.6"/>
    <rect x="26" y="10" width="40" height="6" rx="3" fill="white"/>
    <rect x="22" y="26" width="8" height="8" rx="1" fill="white" opacity="0.4"/>
    <rect x="36" y="26" width="55" height="6" rx="3" fill="white"/>
    <rect x="22" y="42" width="8" height="8" rx="1" fill="white" opacity="0.4"/>
    <rect x="36" y="42" width="30" height="6" rx="3" fill="white"/>
    <rect x="12" y="58" width="8" height="8" rx="1" fill="white" opacity="0.6"/>
    <rect x="26" y="58" width="45" height="6" rx="3" fill="white"/>
  </g>
</svg>
